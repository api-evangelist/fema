actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket or other server-push protocol surface exists anywhere on
    OpenFEMA. The entire platform is request/response REST (plus flat-file
    bulk download), so no AsyncAPI document was created.
