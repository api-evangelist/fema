  - url: https://www.fema.gov/openfema-data-page/disaster-declarations-summaries-v2
    type: APIReference
    note: Disaster Declarations Summaries v2 dataset page and endpoint.
  - url: https://www.fema.gov/openfema-data-page/public-assistance-funded-projects-details-v1
    type: APIReference
