- aid: fema:fema-ipaws-archived-alerts-api
  name: FEMA IPAWS Archived Alerts API
  tags:
  - IPAWS
  - Alerts
  - CAP
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.fema.gov/openfema-data-page/ipaws-archived-alerts-v1
