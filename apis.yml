aid: fema
url: https://raw.githubusercontent.com/api-evangelist/fema/refs/heads/main/apis.yml
name: OpenFEMA
kind: government
description: OpenFEMA is FEMA's open data platform, publishing free, public,
  machine-readable datasets on disaster declarations, public assistance grants,
  hazard mitigation projects, the National Flood Insurance Program (NFIP), and
  emergency alerting through a read-only RESTful API. The API uses OData-style
  query string parameters ($filter, $select, $top, $skip, $orderby) over
  individually versioned dataset endpoints, requires no API key or
  subscription, and returns JSON, CSV, or Parquet.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Government
- Open Data
- Emergency Management
- Disaster
- FEMA
- Public Safety
created: '2026-07-03'
modified: '2026-07-03'
specificationVersion: '0.19'
